# https://taskfile.dev

version: "3"

tasks:
  default:
    desc: Show all tasks
    cmds:
      - task --list-all --sort none

  environment:check:
    desc: Check required tools are available for this environment.
    cmds:
      - ansible --version
      - ansible-galaxy --version
      - ansible-lint --version
      - ansible-playbook --version
      - ansible-vault --version
      - git --version
      - ssh -V
      - task --version
