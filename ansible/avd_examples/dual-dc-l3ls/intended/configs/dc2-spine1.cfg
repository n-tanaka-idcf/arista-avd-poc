interface Ethernet1
   description P2P_dc2-leaf1a_Ethernet1
   no shutdown
   mtu 1500
   no switchport
   ip address 10.255.255.64/31
!
interface Ethernet2
   description P2P_dc2-leaf1b_Ethernet1
   no shutdown
   mtu 1500
   no switchport
   ip address 10.255.255.68/31
